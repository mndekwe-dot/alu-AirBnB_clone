<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="images/icon.svg">
    <title>AirBnB clone</title>
    <link rel="stylesheet" href="styles/4-common.css">
    <link rel="stylesheet" href="styles/3-header.css">
    <link rel="stylesheet" href="styles/3-footer.css">
    <link rel="stylesheet" href="styles/6-filters.css">
  </head>
  <body>
    <header>
      <div class="logo"></div>
    </header>
    <div class="container">
      <section class="filters">
        <div class="locations">
          <h3>States</h3>
          <h4>California</h4>
          <ul class="popover">
            <li>
              <h2>California</h2>
              <ul>
                <li>San Francisco</li>
                <li>Los Angeles</li>
                <li>San Diego</li>
              </ul>
            </li>
            <li>
              <h2>Nevada</h2>
              <ul>
                <li>Las Vegas</li>
                <li>Reno</li>
              </ul>
            </li>
          </ul>
        </div>
        <div class="amenities">
          <h3>Amenities</h3>
          <h4>WiFi</h4>
          <ul class="popover">
            <li>WiFi</li>
            <li>Pool</li>
            <li>Kitchen</li>
            <li>Air conditioning</li>
            <li>Washer</li>
          </ul>
        </div>
        <button>Search</button>
      </section>
    </div>
    <footer>
      <span>Best School</span>
    </footer>
  </body>
</html>
